    <style>
      @media (max-width: 768px) {
        /* 1. إصلاح حجم الشاشة ومنع الخروج عن الإطار */
        html, body, #root { overflow-x: hidden !important; max-width: 100vw !important; width: 100% !important; margin: 0; padding: 0; }
        
        /* 2. إجبار النص على النزول لسطر جديد ومنع اختفاء أو انقطاع الكتابة */
        * { box-sizing: border-box !important; word-wrap: break-word !important; overflow-wrap: break-word !important; white-space: normal !important; }
        
        /* 3. تصغير الأيقونات الكبيرة والصور لتتناسب مع الشاشة */
        svg, .icon, [class*="icon"] { max-width: 40px !important; max-height: 40px !important; height: auto !important; width: auto !important; }
        img, video { max-width: 100% !important; height: auto !important; object-fit: contain !important; }
        header img, nav img, .logo img, a img { max-height: 55px !important; width: auto !important; }
        
        /* 4. أحجام خطوط مرنة ومناسبة للموبايل */
        h1 { font-size: clamp(1.6rem, 6.5vw, 2.2rem) !important; line-height: 1.35 !important; }
        h2 { font-size: clamp(1.3rem, 5.5vw, 1.8rem) !important; line-height: 1.35 !important; }
        h3 { font-size: clamp(1rem, 4.2vw, 1.3rem) !important; }
        p, li { font-size: clamp(0.85rem, 3.4vw, 1rem) !important; line-height: 1.6 !important; }
        
        /* 5. ترتيب الأقسام والمسافات */
        #tour, #studios, #meeting-room, #contact { padding: 3rem 5% !important; }
        #tour > div, #studios > div, #meeting-room > div, #contact > div { max-width: 100% !important; width: 100% !important; }
        
        /* تحويل الشبكات إلى عمود واحد بدل عمودين لتأخذ العناصر مساحتها الكاملة ولا تتزاحم */
        div[style*="repeat(3, 1fr)"], div[style*="repeat(3,1fr)"], div[style*="grid"] { grid-template-columns: 1fr !important; gap: 1.5rem !important; }
        
        #meeting-room > div:last-child { grid-template-columns: 1fr !important; }
        #meeting-room > div:last-child > div { padding: 1.5rem !important; }
        
        /* 6. إصلاح نموذج الاتصال (الفورم) ليصبح عمودياً بالكامل */
        #contact form { display: flex !important; flex-direction: column !important; gap: 15px !important; }
        #contact form > div, #contact form > button { grid-column: auto !important; width: 100% !important; }
        #contact input, #contact textarea, #contact select { font-size: 16px !important; width: 100% !important; }
        #contact form > button { width: 100% !important; }
        
        /* 7. تظبيط الفوتر والحاويات */
        footer { padding: 2.5rem 5% !important; text-align: center !important; }
        footer img { height: 55px !important; margin-bottom: 10px !important; }
        .container, section > div { padding-left: 15px !important; padding-right: 15px !important; }
      }
